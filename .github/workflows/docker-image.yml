name: Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  APP_DIR: /opt/alphapayy
  CONTAINER_NAME: alphapayy-api
  CONTAINER_PORT: "8090"
  HOST_PORT: "8090"
  LANDING_DIR: /var/www/alphapayy
  ACME_WEBROOT: /var/www/letsencrypt
  API_DOMAIN: api.alphapayy.com
  APEX_DOMAIN: alphapayy.com
  WWW_DOMAIN: www.alphapayy.com

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Instagram VM
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    env:
      DEPLOY_HOST: ${{ secrets.PROD_SSH_HOST }}
      DEPLOY_USER: ${{ secrets.PROD_SSH_USER }}
      DEPLOY_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
      DEPLOY_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
      PROD_ENV_B64: ${{ secrets.PROD_ENV_B64 }}
      LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL || 'admin@alphapayy.com' }}
      IMAGE_TAG: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$PROD_ENV_B64"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload environment file
        run: |
          printf '%s' "$PROD_ENV_B64" | base64 -d > /tmp/alphapayy.env.raw
          python3 - <<'PY'
          from pathlib import Path

          source = Path("/tmp/alphapayy.env.raw")
          target = Path("/tmp/alphapayy.env")
          normalized_lines = []

          for line in source.read_text().splitlines():
              if not line or line.lstrip().startswith("#") or "=" not in line:
                  normalized_lines.append(line)
                  continue

              key, value = line.split("=", 1)
              key = key.strip()
              if not key or any(char.isspace() for char in key):
                  raise SystemExit(f"Invalid environment key: {key!r}")
              normalized_lines.append(f"{key}={value}")

          target.write_text("\n".join(normalized_lines) + "\n")
          PY
          chmod 600 /tmp/alphapayy.env
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/alphapayy.env "$DEPLOY_USER@$DEPLOY_HOST:/tmp/alphapayy.env"

      - name: Upload landing page
        run: |
          tar -C landing -czf /tmp/alphapayy-landing.tar.gz .
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/alphapayy-landing.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/alphapayy-landing.tar.gz"

      - name: Log in to GHCR on server
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo docker login ghcr.io -u '${{ github.actor }}' --password-stdin"

      - name: Roll out container
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' <<REMOTE
          set -Eeuo pipefail

          app_dir="${APP_DIR}"
          container_name="${CONTAINER_NAME}"
          next_container="\${container_name}-next"
          image_tag="${IMAGE_TAG}"
          host_port="${HOST_PORT}"
          container_port="${CONTAINER_PORT}"
          landing_dir="${LANDING_DIR}"
          acme_webroot="${ACME_WEBROOT}"
          api_domain="${API_DOMAIN}"
          apex_domain="${APEX_DOMAIN}"
          www_domain="${WWW_DOMAIN}"
          public_ip="${DEPLOY_HOST}"
          letsencrypt_email="${LETSENCRYPT_EMAIL}"

          sudo mkdir -p "\$app_dir"
          sudo install -m 600 /tmp/alphapayy.env "\$app_dir/.env"
          rm -f /tmp/alphapayy.env
          sudo mkdir -p "\$landing_dir" "\$acme_webroot"
          sudo tar -xzf /tmp/alphapayy-landing.tar.gz -C "\$landing_dir"
          rm -f /tmp/alphapayy-landing.tar.gz
          sudo chown -R www-data:www-data "\$landing_dir" "\$acme_webroot"

          sudo docker pull "\$image_tag"
          sudo docker rm -f "\$next_container" >/dev/null 2>&1 || true
          sudo docker run -d \
            --name "\$next_container" \
            --env-file "\$app_dir/.env" \
            "\$image_tag"

          for attempt in \$(seq 1 30); do
            status="\$(sudo docker inspect -f '{{.State.Health.Status}}' "\$next_container" 2>/dev/null || true)"
            if [ "\$status" = "healthy" ]; then
              break
            fi
            if [ "\$status" = "unhealthy" ]; then
              sudo docker logs --tail=100 "\$next_container"
              exit 1
            fi
            sleep 2
          done

          if [ "\$(sudo docker inspect -f '{{.State.Health.Status}}' "\$next_container")" != "healthy" ]; then
            sudo docker logs --tail=100 "\$next_container"
            exit 1
          fi

          sudo docker rm -f "\$container_name" >/dev/null 2>&1 || true
          sudo docker rm -f "\$next_container"
          sudo docker run -d \
            --name "\$container_name" \
            --restart unless-stopped \
            --env-file "\$app_dir/.env" \
            -p "\$host_port:\$container_port" \
            "\$image_tag"

          for attempt in \$(seq 1 30); do
            if curl -fsS "http://127.0.0.1:\$host_port/health"; then
              break
            fi
            sleep 2
          done

          if ! curl -fsS "http://127.0.0.1:\$host_port/health"; then
            sudo docker logs --tail=100 "\$container_name"
            exit 1
          fi

          write_alphapayy_nginx() {
            sudo API_DOMAIN="\$api_domain" \
              APEX_DOMAIN="\$apex_domain" \
              WWW_DOMAIN="\$www_domain" \
              LANDING_DIR="\$landing_dir" \
              ACME_WEBROOT="\$acme_webroot" \
              CONTAINER_PORT="\$container_port" \
              python3 - <<'PY'
          import os
          from pathlib import Path

          api_domain = os.environ["API_DOMAIN"]
          apex_domain = os.environ["APEX_DOMAIN"]
          www_domain = os.environ["WWW_DOMAIN"]
          landing_dir = os.environ["LANDING_DIR"]
          acme_webroot = os.environ["ACME_WEBROOT"]
          container_port = os.environ["CONTAINER_PORT"]
          cert_dir = Path(f"/etc/letsencrypt/live/{apex_domain}")
          ssl_enabled = (cert_dir / "fullchain.pem").exists() and (cert_dir / "privkey.pem").exists()

          http_config = f"""
          server {{
              listen 80;
              listen [::]:80;
              server_name {api_domain};

              location ^~ /.well-known/acme-challenge/ {{
                  root {acme_webroot};
              }}

              location / {{
                  proxy_pass http://127.0.0.1:{container_port};
                  proxy_http_version 1.1;
                  proxy_set_header Connection "";
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_cache off;
                  proxy_request_buffering off;
                  proxy_buffering off;
                  proxy_connect_timeout 60s;
                  proxy_send_timeout 300s;
                  proxy_read_timeout 300s;
              }}
          }}

          server {{
              listen 80;
              listen [::]:80;
              server_name {apex_domain} {www_domain};
              root {landing_dir};
              index index.html;

              location ^~ /.well-known/acme-challenge/ {{
                  root {acme_webroot};
              }}

              location / {{
                  try_files \$uri \$uri/ /index.html;
              }}
          }}
          """

          https_config = ""
          if ssl_enabled:
              fullchain = cert_dir / "fullchain.pem"
              privkey = cert_dir / "privkey.pem"
              https_config = f"""

          server {{
              listen 443 ssl;
              listen [::]:443 ssl;
              server_name {api_domain};
              ssl_certificate {fullchain};
              ssl_certificate_key {privkey};

              location / {{
                  proxy_pass http://127.0.0.1:{container_port};
                  proxy_http_version 1.1;
                  proxy_set_header Connection "";
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_cache off;
                  proxy_request_buffering off;
                  proxy_buffering off;
                  proxy_connect_timeout 60s;
                  proxy_send_timeout 300s;
                  proxy_read_timeout 300s;
              }}
          }}

          server {{
              listen 443 ssl;
              listen [::]:443 ssl;
              server_name {apex_domain} {www_domain};
              ssl_certificate {fullchain};
              ssl_certificate_key {privkey};
              root {landing_dir};
              index index.html;

              location / {{
                  try_files \$uri \$uri/ /index.html;
              }}
          }}
          """

          Path("/etc/nginx/sites-available/alphapayy").write_text(http_config + https_config)
          enabled = Path("/etc/nginx/sites-enabled/alphapayy")
          if not enabled.exists():
              enabled.symlink_to("/etc/nginx/sites-available/alphapayy")
          PY
          }

          write_alphapayy_nginx
          sudo nginx -t
          sudo systemctl reload nginx

          dns_ready=true
          for domain in "\$api_domain" "\$apex_domain" "\$www_domain"; do
            if ! getent ahostsv4 "\$domain" | awk '{print \$1}' | grep -qx "\$public_ip"; then
              dns_ready=false
            fi
          done

          if [ "\$dns_ready" = "true" ]; then
            sudo certbot certonly \
              --webroot \
              -w "\$acme_webroot" \
              --cert-name "\$apex_domain" \
              -d "\$api_domain" \
              -d "\$apex_domain" \
              -d "\$www_domain" \
              --email "\$letsencrypt_email" \
              --agree-tos \
              --non-interactive \
              --keep-until-expiring
            write_alphapayy_nginx
          else
            echo "DNS is not pointing all AlphaPayy domains to \$public_ip yet; skipping Let's Encrypt."
          fi

          nginx_site="/etc/nginx/sites-available/instagram-api.conf"
          if [ -f "\$nginx_site" ]; then
            sudo python3 - <<'PY'
          from pathlib import Path

          site = Path("/etc/nginx/sites-available/instagram-api.conf")
          text = site.read_text()
          start_marker = "    # alphapayy-api managed by alphapayy CI/CD"
          catch_all_marker = "    location / {\n"
          block = """\
              # alphapayy-api managed by alphapayy CI/CD
              location = /alphapayy-api {
                  return 308 /alphapayy-api/;
              }

              location ^~ /alphapayy-api/ {
                  rewrite ^/alphapayy-api/?(.*)$ /\$1 break;
                  proxy_pass http://127.0.0.1:8090;
                  proxy_http_version 1.1;
                  proxy_set_header Connection "";
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_cache off;
                  proxy_request_buffering off;
                  proxy_buffering off;
                  proxy_connect_timeout 60s;
                  proxy_send_timeout 300s;
                  proxy_read_timeout 300s;
              }

          """

          if start_marker in text:
              start = text.index(start_marker)
              end = text.index(catch_all_marker, start)
              text = text[:start] + block + text[end:]
          else:
              if catch_all_marker not in text:
                  raise SystemExit(f"Could not find nginx insertion marker: {catch_all_marker!r}")
              text = text.replace(catch_all_marker, block + catch_all_marker, 1)

          site.write_text(text)
          PY
          fi

          sudo nginx -t
          sudo systemctl reload nginx
          curl -fsS "http://127.0.0.1/alphapayy-api/health"
          curl -fsS -H "Host: \$api_domain" "http://127.0.0.1/health"
          curl -fsS -H "Host: \$apex_domain" "http://127.0.0.1/" >/dev/null
          sudo docker image prune -af --filter "until=168h" >/dev/null 2>&1 || true
          REMOTE
