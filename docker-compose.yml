services:
  graph-agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: graph-agent-standalone:local
    container_name: graph-agent-api
    env_file:
      - .env
    environment:
      PORT: "8090"
      WEB_CONCURRENCY: "1"
    ports:
      - "8090:8090"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
